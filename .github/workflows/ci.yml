name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: API build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore DancePlatform.Tests/DancePlatform.Tests.csproj
      - name: Build
        run: dotnet build DancePlatform.Tests/DancePlatform.Tests.csproj --no-restore -c Release
      - name: Test
        run: dotnet test DancePlatform.Tests/DancePlatform.Tests.csproj --no-build -c Release --verbosity normal

  frontend:
    name: UI build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dance-platform-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dance-platform-ui/package-lock.json
      - name: Install
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build -- --configuration production
