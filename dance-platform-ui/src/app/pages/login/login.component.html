<div class="login-page">
  <div class="card login-card">
    <h1 class="page-title">{{ isRegister() ? 'Create Account' : 'Welcome Back' }}</h1>
    <p class="subtitle">{{ isRegister() ? 'Start your dance journey' : 'Sign in to continue' }}</p>

    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()" #form="ngForm">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input id="login-username" type="text" [(ngModel)]="username" name="username" required minlength="3" placeholder="your_username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" [(ngModel)]="password" name="password" required [attr.minlength]="isRegister() ? 8 : null" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" [attr.autocomplete]="isRegister() ? 'new-password' : 'current-password'" />
        @if (isRegister()) {
          <span class="field-hint">At least 8 characters</span>
        }
      </div>
      @if (isRegister()) {
        <div class="form-group">
          <label for="login-name">Full Name</label>
          <input id="login-name" type="text" [(ngModel)]="name" name="name" required placeholder="Your Name" autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="login-nickname">Nickname</label>
          <input id="login-nickname" type="text" [(ngModel)]="nickname" name="nickname" placeholder="Optional nickname" autocomplete="nickname" />
        </div>
      }
      <button type="submit" class="btn btn--primary btn--full" [disabled]="loading()">
        {{ loading() ? 'Loading...' : (isRegister() ? 'Create Account' : 'Sign In') }}
      </button>
    </form>

    <p class="toggle-text">
      {{ isRegister() ? 'Already have an account?' : 'New here?' }}
      <button type="button" class="link" (click)="toggleMode()">{{ isRegister() ? 'Sign in' : 'Create account' }}</button>
    </p>
  </div>
</div>
