<a class="skip-link" href="#main-content">Skip to content</a>
<header class="header">
  <div class="container header__inner">
    <a routerLink="/dances" class="header__logo" (click)="closeMenu()">Dance Platform</a>

    @if (auth.isAuthenticated() && practiceTimer.active()) {
      <a routerLink="/practice" class="practice-clock" (click)="closeMenu()"
         title="Practice session in progress — view log" aria-label="Practice session time, view practice log">
        <span class="practice-clock__dot" aria-hidden="true"></span>
        <i class="fa-solid fa-stopwatch" aria-hidden="true"></i>
        <span class="practice-clock__time">{{ formatClock(practiceTimer.liveSeconds()) }}</span>
      </a>
    }

    <button
      class="header__toggle"
      type="button"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="primary-nav"
      aria-label="Toggle navigation menu"
      (click)="toggleMenu()">
      @if (menuOpen()) { <i class="fa-solid fa-xmark"></i> } @else { <i class="fa-solid fa-bars"></i> }
    </button>

    <nav id="primary-nav" class="header__nav" [class.header__nav--open]="menuOpen()">
      @if (auth.isAuthenticated()) {
        <a routerLink="/my-dances" routerLinkActive="is-active" ariaCurrentWhenActive="page" (click)="closeMenu()">My Dances</a>
      }
      <a routerLink="/dances" routerLinkActive="is-active" ariaCurrentWhenActive="page" (click)="closeMenu()">Browse</a>
      @if (role.isAdmin()) {
        <a routerLink="/admin/add-video" routerLinkActive="is-active" ariaCurrentWhenActive="page" class="header__admin-link" (click)="closeMenu()"><i class="fa-solid fa-plus"></i> Add Video</a>
      }
      @if (auth.isAuthenticated()) {
        <a routerLink="/practice" routerLinkActive="is-active" ariaCurrentWhenActive="page" (click)="closeMenu()">Practice</a>
        <a routerLink="/profile" routerLinkActive="is-active" ariaCurrentWhenActive="page" (click)="closeMenu()">Profile</a>
        <button class="btn btn--ghost header__signout" (click)="closeMenu(); auth.logout()">Sign out</button>
      } @else {
        <a routerLink="/register" class="btn btn--ghost" (click)="closeMenu()">Sign up</a>
        <a routerLink="/login" class="btn btn--primary" (click)="closeMenu()">Sign in</a>
      }
    </nav>
  </div>
</header>
<main id="main-content" class="main">
  <router-outlet />
</main>
